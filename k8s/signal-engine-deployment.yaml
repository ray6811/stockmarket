apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-engine-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signal-engine
  template:
    metadata:
      labels:
        app: signal-engine
    spec:
      containers:
        - name: signal-engine
          image: signal-engine-service:latest
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
